name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.21"

      - name: Install git-cliff
        uses: taiki-e/install-action@git-cliff

      # Generate full CHANGELOG.md
      - name: Generate changelog
        run: |
          git cliff --config cliff.toml --output CHANGELOG.md

      # Commit updated changelog
      - name: Commit changelog
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add CHANGELOG.md
          git commit -m "docs(changelog): update for ${{ github.ref_name }}" || echo "No changes"

      # Push updated changelog to main
      - name: Push changelog
        run: |
          git push origin HEAD:main

      # Generate release notes for the tag
      - name: Generate release notes
        run: |
          git cliff \
            --config cliff.toml \
            --tag ${{ github.ref_name }} \
            --output release-notes.md

      # Build Go binaries
      - name: Build binaries
        run: |
          mkdir dist

          GOOS=linux GOARCH=amd64 go build -o dist/gotestx-linux-amd64
          GOOS=darwin GOARCH=amd64 go build -o dist/gotestx-darwin-amd64
          GOOS=darwin GOARCH=arm64 go build -o dist/gotestx-darwin-arm64
          GOOS=windows GOARCH=amd64 go build -o dist/gotestx-windows-amd64.exe

      # Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: dist/*